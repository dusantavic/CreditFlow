services:
  api:
    build:
      context: .
      dockerfile: CreditFlow.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      # - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - CreditBureau__BaseUrl=http://credit-bureau:8080 # container-to-container internal communication
    depends_on:
      db:
        condition: service_healthy

  credit-bureau: 
    build: 
      context: .
      dockerfile: CreditBureau.Api/Dockerfile
    ports: 
      - "8081:8080"

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - creditflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h 127.0.0.1"]
      interval: 3s
      timeout: 10s
      retries: 20
      start_period: 20s
volumes:
  creditflow-db-data: