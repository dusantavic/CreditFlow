name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore CreditFlow.slnx

      - name: Build
        run: dotnet build CreditFlow.slnx --no-restore --configuration Release

      - name: Run Domain unit tests
        run: dotnet test CreditFlow.Domain.UnitTests --no-build --configuration Release --logger "trx;LogFileName=domain-tests.trx"

      - name: Run Application unit tests
        run: dotnet test CreditFlow.Application.UnitTests --no-build --configuration Release --logger "trx;LogFileName=application-tests.trx"

      - name: Run Api integration tests
        run: dotnet test CreditFlow.Api.IntegrationTests --no-build --configuration Release --logger "trx;LogFileName=api-integration-tests.trx"

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: '**/*.trx'
          reporter: dotnet-trx
          fail-on-error: true